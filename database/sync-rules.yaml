# PowerSync Sync Rules for SmartOps Mobile App
# Deploy this to your PowerSync instance

bucket_definitions:
  # User-specific bucket - each user only syncs their own data
  user_bucket:
    parameters: [user_id]
    
    data:
      # ─── Tickets ───────────────────────────────────────────────────────
      # Sync tickets for sites the user has access to
      - SELECT 
          t.id,
          t.site_code,
          t.ticket_number,
          t.title,
          t.description,
          t.status,
          t.priority,
          t.category,
          t.area,
          t.assigned_to,
          t.created_by,
          t.due_date,
          t.closed_at,
          t.created_at,
          t.updated_at
        FROM tickets t
        INNER JOIN user_sites us ON t.site_code = us.site_code
        WHERE us.user_id = token_parameters.user_id()
      
      # ─── Areas / Assets ────────────────────────────────────────────────
      # Sync areas for user's sites
      - SELECT 
          a.id,
          a.site_code,
          a.asset_name,
          a.asset_type,
          a.location,
          a.description,
          a.created_at,
          a.updated_at
        FROM areas a
        INNER JOIN user_sites us ON a.site_code = us.site_code
        WHERE us.user_id = token_parameters.user_id()
      
      # ─── Categories ────────────────────────────────────────────────────
      # Global complaint categories (all users)
      - SELECT 
          id,
          category,
          description
        FROM categories
      
      # ─── User Sites ────────────────────────────────────────────────────
      # User's assigned sites
      - SELECT 
          id,
          user_id,
          site_id,
          site_code,
          site_name
        FROM user_sites
        WHERE user_id = token_parameters.user_id()
      
      # ─── Site Logs ─────────────────────────────────────────────────────
      # Sync site logs for user's sites
      - SELECT 
          sl.id,
          sl.site_code,
          sl.executor_id,
          sl.log_name,
          sl.task_name,
          sl.temperature,
          sl.rh,
          sl.tds,
          sl.ph,
          sl.hardness,
          sl.chemical_dosing,
          sl.remarks,
          sl.entry_time,
          sl.end_time,
          sl.signature,
          sl.assigned_to,
          sl.attachment,
          sl.status,
          sl.created_at,
          sl.updated_at
        FROM site_logs sl
        INNER JOIN user_sites us ON sl.site_code = us.site_code
        WHERE us.user_id = token_parameters.user_id()
      
      # ─── Chiller Readings ──────────────────────────────────────────────
      # Sync chiller readings for user's sites
      - SELECT 
          cr.id,
          cr.log_id,
          cr.site_code,
          cr.chiller_id,
          cr.equipment_id,
          cr.asset_name,
          cr.asset_type,
          cr.executor_id,
          cr.date_shift,
          cr.assigned_to,
          cr.reading_time,
          cr.start_datetime,
          cr.end_datetime,
          cr.condenser_inlet_temp,
          cr.condenser_outlet_temp,
          cr.evaporator_inlet_temp,
          cr.evaporator_outlet_temp,
          cr.compressor_suction_temp,
          cr.motor_temperature,
          cr.saturated_condenser_temp,
          cr.saturated_suction_temp,
          cr.set_point_celsius,
          cr.discharge_pressure,
          cr.main_suction_pressure,
          cr.oil_pressure,
          cr.oil_pressure_difference,
          cr.condenser_inlet_pressure,
          cr.condenser_outlet_pressure,
          cr.evaporator_inlet_pressure,
          cr.evaporator_outlet_pressure,
          cr.compressor_load_percentage,
          cr.inline_btu_meter,
          cr.remarks,
          cr.sla_status,
          cr.reviewed_by,
          cr.signature_text,
          cr.attachments,
          cr.status,
          cr.created_at,
          cr.updated_at
        FROM chiller_readings cr
        INNER JOIN user_sites us ON cr.site_code = us.site_code
        WHERE us.user_id = token_parameters.user_id()
      
      # ─── PM Instances ──────────────────────────────────────────────────
      # Sync PM instances for user's sites
      - SELECT 
          pm.id,
          pm.site_code,
          pm.title,
          pm.asset_id,
          pm.asset_type,
          pm.location,
          pm.frequency,
          pm.status,
          pm.progress,
          pm.assigned_to_name,
          pm.start_due_date,
          pm.maintenance_id,
          pm.client_sign,
          pm.before_image,
          pm.after_image,
          pm.created_at,
          pm.updated_at
        FROM pm_instances pm
        INNER JOIN user_sites us ON pm.site_code = us.site_code
        WHERE us.user_id = token_parameters.user_id()
      
      # ─── PM Checklist Master ───────────────────────────────────────────
      # Global PM checklists (all users)
      - SELECT 
          id,
          title,
          asset_type,
          frequency,
          created_at
        FROM pm_checklist_master
      
      # ─── PM Checklist Items ────────────────────────────────────────────
      # Global PM checklist items (all users)
      - SELECT 
          id,
          checklist_id,
          task_name,
          field_type,
          sequence_no,
          image_mandatory,
          remarks_mandatory
        FROM pm_checklist_items
      
      # ─── PM Responses ──────────────────────────────────────────────────
      # Sync PM responses for user's PM instances
      - SELECT 
          pr.id,
          pr.instance_id,
          pr.checklist_item_id,
          pr.response_value,
          pr.readings,
          pr.remarks,
          pr.image_url,
          pr.created_at,
          pr.updated_at
        FROM pm_responses pr
        INNER JOIN pm_instances pm ON pr.instance_id = pm.id
        INNER JOIN user_sites us ON pm.site_code = us.site_code
        WHERE us.user_id = token_parameters.user_id()
      
      # ─── Log Master ────────────────────────────────────────────────────
      # Global log master (all users)
      - SELECT 
          id,
          task_name,
          log_name,
          sequence_number,
          log_id,
          dlr,
          dbr,
          nlt,
          nmt,
          created_at,
          updated_at
        FROM log_master

# Token parameters function
# This extracts the user_id from the JWT token
token_parameters:
  user_id: "SELECT user_id FROM token_parameters()"
